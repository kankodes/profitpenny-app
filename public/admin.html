<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>ProfitPenny Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0C0D0F;
  --surface:#141518;
  --surface2:#1C1E22;
  --surface3:#242629;
  --border:#2A2D33;
  --border2:#343840;
  --text:#F0F1F3;
  --textMuted:#8A8F9A;
  --textDim:#555A65;
  --accent:#B5D334;
  --accentDim:#8FA228;
  --accentBg:rgba(181,211,52,0.08);
  --red:#F87171;
  --redBg:rgba(248,113,113,0.1);
  --amber:#FBB040;
  --amberBg:rgba(251,176,64,0.1);
  --blue:#60A5FA;
  --blueBg:rgba(96,165,250,0.1);
  --green:#4ADE80;
  --greenBg:rgba(74,222,128,0.1);
  --radius:10px;
  --font-head:'Syne',sans-serif;
  --font-mono:'Space Mono',monospace;
  --font-body:'DM Sans',sans-serif;
}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
input,select,textarea,button{font-family:inherit;font-size:inherit;}
button{cursor:pointer;}

/* ── LAYOUT ── */
#root{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.content{flex:1;overflow-y:auto;padding:28px;}

/* ── SIDEBAR ── */
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10;}
.sb-logo-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:13px;color:#0A0A0A;letter-spacing:-0.5px;}
.sb-logo-text{font-family:var(--font-head);font-weight:700;font-size:13px;color:var(--text);line-height:1.2;}
.sb-logo-sub{font-size:9px;color:var(--textDim);font-family:var(--font-mono);letter-spacing:0.1em;text-transform:uppercase;}
.sb-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sb-section{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--textDim);font-family:var(--font-mono);padding:12px 10px 6px;margin-top:4px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--textMuted);transition:all .15s;text-decoration:none;border:none;background:none;width:100%;text-align:left;font-size:13px;}
.sb-item:hover{background:var(--surface2);color:var(--text);}
.sb-item.active{background:var(--accentBg);color:var(--accent);font-weight:600;}
.sb-item.active .sb-icon{color:var(--accent);}
.sb-icon{width:16px;height:16px;flex-shrink:0;opacity:0.7;}
.sb-item.active .sb-icon{opacity:1;}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;font-family:var(--font-mono);}
.sb-footer{padding:12px 8px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;}
.sb-av{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0A0A0A;font-family:var(--font-head);flex-shrink:0;}
.sb-user-name{font-size:12px;font-weight:600;color:var(--text);}
.sb-user-role{font-size:10px;color:var(--textDim);font-family:var(--font-mono);}
.sb-logout{margin-left:auto;background:none;border:none;color:var(--textDim);padding:4px;border-radius:6px;transition:color .15s;}
.sb-logout:hover{color:var(--red);}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.card-sm{padding:14px 16px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;inset:0;background:var(--accent-grad,transparent);opacity:0.04;}
.stat-num{font-family:var(--font-head);font-size:32px;font-weight:800;line-height:1;}
.stat-label{font-size:11px;color:var(--textMuted);margin-top:6px;text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-mono);}
.stat-icon{position:absolute;top:16px;right:16px;opacity:0.15;font-size:28px;}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--textDim);border-bottom:1px solid var(--border);font-family:var(--font-mono);font-weight:400;}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}
.tbl-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;font-family:var(--font-mono);}
.badge-green{background:var(--greenBg);color:var(--green);}
.badge-red{background:var(--redBg);color:var(--red);}
.badge-amber{background:var(--amberBg);color:var(--amber);}
.badge-blue{background:var(--blueBg);color:var(--blue);}
.badge-accent{background:var(--accentBg);color:var(--accent);}
.badge-dim{background:var(--surface3);color:var(--textMuted);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;transition:all .15s;border:none;}
.btn-accent{background:var(--accent);color:#0A0A0A;}
.btn-accent:hover{background:#c8e840;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.btn-secondary:hover{background:var(--surface3);}
.btn-danger{background:var(--redBg);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
.btn-danger:hover{background:rgba(248,113,113,0.2);}
.btn-ghost{background:none;color:var(--textMuted);padding:6px 8px;}
.btn-ghost:hover{color:var(--text);background:var(--surface2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-icon{padding:7px;border-radius:8px;}

/* ── FORM ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--textMuted);font-family:var(--font-mono);}
.inp{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);width:100%;outline:none;transition:border .15s;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--textDim);}
.sel{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);width:100%;outline:none;transition:border .15s;appearance:none;cursor:pointer;}
.sel:focus{border-color:var(--accent);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:none}}
.modal-title{font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text);}
.modal-footer{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% -10%,rgba(181,211,52,0.12),transparent),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(96,165,250,0.06),transparent);}
.login-box{position:relative;z-index:1;width:100%;max-width:400px;padding:20px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-title{font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.login-sub{font-size:13px;color:var(--textMuted);margin-top:6px;}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:32px;}
.login-restrict{text-align:center;margin-top:16px;font-size:12px;color:var(--textDim);font-family:var(--font-mono);}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap;}
.page-title{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--text);}
.page-sub{font-size:13px;color:var(--textMuted);margin-top:3px;}

/* ── PERMS GRID ── */
.perms-grid{display:grid;gap:2px;}
.perm-row{display:flex;align-items:center;padding:10px 14px;border-radius:8px;gap:12px;background:var(--surface2);}
.perm-name{flex:1;font-size:13px;font-weight:500;}
.perm-toggle{width:36px;height:20px;border-radius:99px;border:none;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0;}
.perm-toggle.on{background:var(--accent);}
.perm-toggle.off{background:var(--surface3);}
.perm-toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:white;transition:left .2s;}
.perm-toggle.on::after{left:18px;}
.perm-toggle.off::after{left:2px;}

/* ── AUDIT ── */
.audit-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.audit-item:last-child{border-bottom:none;}
.audit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.audit-body{flex:1;}
.audit-action{font-size:13px;color:var(--text);}
.audit-meta{font-size:11px;color:var(--textDim);margin-top:2px;font-family:var(--font-mono);}

/* ── NOTIF COMPOSER ── */
.notif-preview{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:20px 0;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.flex{display:flex;align-items:center;gap:8px;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--font-head);flex-shrink:0;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--surface3);color:var(--textMuted);}
.empty{text-align:center;padding:40px;color:var(--textMuted);font-size:13px;}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;width:260px;}
.search-bar input{background:none;border:none;outline:none;color:var(--text);flex:1;font-size:13px;}
.search-bar input::placeholder{color:var(--textDim);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .3s ease both;}

/* ── TOAST ── */
.toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999;}
.toast{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:fadeUp .25s ease;max-width:320px;}
.toast-success{border-left:3px solid var(--green);}
.toast-error{border-left:3px solid var(--red);}
.toast-info{border-left:3px solid var(--blue);}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, updateDoc, deleteDoc, doc, addDoc, serverTimestamp, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── FIREBASE ──────────────────────────────────────────────────────────────────
const fbConfig = {
  apiKey:"AIzaSyDGiQeVoWpJJ-ONGUBUm36hnoVptgm_UlM",
  authDomain:"profitpenny-ab31d.firebaseapp.com",
  projectId:"profitpenny-ab31d",
  storageBucket:"profitpenny-ab31d.firebasestorage.app",
  messagingSenderId:"963854483464",
  appId:"1:963854483464:web:dd8274c8d5d39ab4cb51bd"
};
const fbApp = initializeApp(fbConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

// Secondary app for creating users WITHOUT logging out the admin session
const fbApp2 = initializeApp(fbConfig, "secondary");
const auth2 = getAuth(fbApp2);

// ── HELPERS ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const strip = o => { if(!o||typeof o!=='object')return o; if(Array.isArray(o))return o.map(strip); const r={}; for(const[k,v]of Object.entries(o))if(v!==undefined)r[k]=strip(v); return r; };
async function listCol(col){const s=await getDocs(collection(db,col));return s.docs.map(d=>({id:d.id,...d.data()}));}
async function setDocF(col,id,data){await setDoc(doc(db,col,id),strip(data));}
async function updateDocF(col,id,data){await updateDoc(doc(db,col,id),strip(data));}
async function deleteDocF(col,id){await deleteDoc(doc(db,col,id));}
async function addDocF(col,data){return await addDoc(collection(db,col),strip(data));}

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  page: 'dashboard',
  user: null,
  userProfile: null,
  users: [], departments: [], clients: [], tasks: [], leaves: [], notifications: [],
  auditLogs: [],
  settings: { companyName:'ProfitPenny Design Studio', leaveQuota:12, workingHours:9, timezone:'Asia/Kolkata', allowWeekendLeave:false },
  modal: null,
  toasts: [],
  search: '',
};

// ── ALLOWED ROLES (admin backend access) ─────────────────────────────────────
const ADMIN_ROLES = ['Admin','Founder','Office Manager'];
const ROLES = ['Admin','Founder','Office Manager','HoD','Senior Designer','Designer','Motion Designer','Content Writer','Strategist','Intern'];
const ROLE_COLORS = {'Admin':'accent','Founder':'accent','Office Manager':'blue','HoD':'amber','Senior Designer':'green','Designer':'green','Motion Designer':'green','Content Writer':'blue','Strategist':'blue','Intern':'dim'};

const PERMISSIONS = [
  {key:'view_all_tasks',    label:'View All Tasks'},
  {key:'edit_tasks',        label:'Edit / Create Tasks'},
  {key:'approve_leaves',    label:'Approve Leaves'},
  {key:'manage_team',       label:'Manage Team Members'},
  {key:'view_financials',   label:'View Financial Data'},
  {key:'manage_clients',    label:'Manage Clients'},
  {key:'manage_meetings',   label:'Manage Meetings'},
  {key:'broadcast_notifs',  label:'Send Broadcast Notifications'},
  {key:'view_reports',      label:'View Reports & Analytics'},
  {key:'admin_backend',     label:'Access Admin Backend'},
];

const DEFAULT_PERMS = {
  'Admin':          {view_all_tasks:true,edit_tasks:true,approve_leaves:true,manage_team:true,view_financials:true,manage_clients:true,manage_meetings:true,broadcast_notifs:true,view_reports:true,admin_backend:true},
  'Founder':        {view_all_tasks:true,edit_tasks:true,approve_leaves:true,manage_team:true,view_financials:true,manage_clients:true,manage_meetings:true,broadcast_notifs:true,view_reports:true,admin_backend:true},
  'Office Manager': {view_all_tasks:true,edit_tasks:true,approve_leaves:true,manage_team:true,view_financials:false,manage_clients:true,manage_meetings:true,broadcast_notifs:true,view_reports:true,admin_backend:true},
  'HoD':            {view_all_tasks:true,edit_tasks:true,approve_leaves:true,manage_team:false,view_financials:false,manage_clients:false,manage_meetings:true,broadcast_notifs:false,view_reports:true,admin_backend:false},
  'default':        {view_all_tasks:false,edit_tasks:false,approve_leaves:false,manage_team:false,view_financials:false,manage_clients:false,manage_meetings:false,broadcast_notifs:false,view_reports:false,admin_backend:false},
};

// ── AUDIT LOG ─────────────────────────────────────────────────────────────────
async function audit(action, detail=''){
  const entry = { action, detail, by: state.userProfile?.name||state.user?.email||'Unknown', at: new Date().toISOString() };
  await addDocF('auditLogs', entry);
  state.auditLogs.unshift(entry);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type='success'){
  const id = Date.now();
  state.toasts.push({id,msg,type});
  renderToasts();
  setTimeout(()=>{ state.toasts = state.toasts.filter(t=>t.id!==id); renderToasts(); }, 3500);
}
function renderToasts(){
  let el = $('toasts');
  if(!el){ el=document.createElement('div'); el.id='toasts'; el.className='toasts'; document.body.appendChild(el); }
  el.innerHTML = state.toasts.map(t=>`<div class="toast toast-${t.type}">${t.type==='success'?'✓':t.type==='error'?'✕':'ℹ'} ${t.msg}</div>`).join('');
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData(){
  try {
    const [users,departments,clients,tasks,leaves,notifications] = await Promise.all([
      listCol('users'), listCol('departments'), listCol('clients'),
      listCol('tasks'), listCol('leaves'), listCol('notifications'),
    ]);
    state.users=users; state.departments=departments; state.clients=clients;
    state.tasks=tasks; state.leaves=leaves; state.notifications=notifications;
    // Load settings
    try{ const s=await getDocs(collection(db,'settings')); s.docs.forEach(d=>{ if(d.id==='main') state.settings={...state.settings,...d.data()}; }); }catch(e){}
    // Load audit logs (last 50)
    try{ const q=query(collection(db,'auditLogs'),orderBy('at','desc'),limit(50)); const al=await getDocs(q); state.auditLogs=al.docs.map(d=>({id:d.id,...d.data()})); }catch(e){}
    render();
  } catch(e){ console.error(e); }
}

// ── AUTH FLOW ─────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if(user){
    state.user=user;
    // Check if user has admin backend access
    const profile = state.users.find(u=>u.email===user.email) || (await listCol('users')).find(u=>u.email===user.email);
    if(profile && ADMIN_ROLES.includes(profile.role)){
      state.userProfile=profile; state.users=await listCol('users');
      await loadData(); render();
    } else if(profile){
      renderAccessDenied();
    } else {
      // New user not in DB yet — allow if first admin
      state.userProfile={name:user.email,role:'Admin',email:user.email};
      await loadData(); render();
    }
  } else { state.user=null; state.userProfile=null; renderLogin(); }
});

// ── RENDER LOGIN ──────────────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap">
    <div class="login-bg"></div>
    <div class="login-box fade-up">
      <div class="login-logo">
        <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div class="sb-logo-mark" style="width:36px;height:36px;font-size:16px;">PP</div>
          <div style="text-align:left;">
            <div style="font-family:var(--font-head);font-weight:800;font-size:18px;">ProfitPenny</div>
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.12em;">Admin Console</div>
          </div>
        </div>
        <div class="login-sub">Restricted access — authorised personnel only</div>
      </div>
      <div class="login-card">

window.sendBroadcast = async () => {
  const title=$('bc-title').value.trim(), body=$('bc-body').value.trim(), target=$('bc-target').value, type=$('bc-type').value;
  if(!title||!body){toast('Enter title and message','error');return;}
  const usersToNotify = target==='all' ? state.users : state.users.filter(u=>u.role===target);
  const notifs = usersToNotify.map(u=>({ id:'bc'+Date.now()+Math.random(), type, title, body, to:u.id, from:'admin', ref:'broadcast', refType:'broadcast', read:false, at:new Date().toISOString() }));
  for(const n of notifs){ await setDocF('notifications',n.id,n); state.notifications.push(n); }
  await audit(`Broadcast sent: "${title}"`, `To: ${target}, ${notifs.length} users`);
  toast(`Broadcast sent to ${notifs.length} users`);
  $('bc-title').value=''; $('bc-body').value='';
  render();
};

          <button class="perm-toggle ${s.allowWeekendLeave?'on':'off'}" id="s-weekend" onclick="this.classList.toggle('on');this.classList.toggle('off');"></button>
        </div>
        <button class="btn btn-accent btn-sm" onclick="saveSettings()">Save</button>
      </div>
      <div class="card">
        <div style="font-family:var(--font-head);font-weight:700;font-size:15px;margin-bottom:16px;">Danger Zone</div>
        <p style="font-size:13px;color:var(--textMuted);margin-bottom:14px;">These actions are irreversible. Proceed with caution.</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button class="btn btn-danger" onclick="toast('Not implemented in demo — connect your own backup system','info')">Export All Data (JSON)</button>
          <button class="btn btn-danger" onclick="toast('Contact Anthropic support to wipe production data','info')">Reset All App Data</button>
        </div>
      </div>
      <div class="card">
        <div style="font-family:var(--font-head);font-weight:700;font-size:15px;margin-bottom:16px;">Admin Users</div>
        <p style="font-size:13px;color:var(--textMuted);margin-bottom:14px;">Users with access to this admin console:</p>
        ${state.users.filter(u=>ADMIN_ROLES.includes(u.role)).map(u=>`
          <div class="flex" style="margin-bottom:10px;">
            <div class="avatar" style="background:${avatarColor(u.av)};color:#0A0A0A;width:28px;height:28px;font-size:10px;">${u.av}</div>
            <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${u.name}</div><div style="font-size:11px;color:var(--textMuted);">${u.email}</div></div>
            <span class="badge badge-${ROLE_COLORS[u.role]||'dim'}">${u.role}</span>
          </div>`).join('') || '<div style="color:var(--textMuted);font-size:13px;">No admin users yet</div>'}
      </div>
    </div>
  </div>`;
}

window.saveSettings = async () => {
  const s = {
    companyName: $('s-company')?.value||state.settings.companyName,
    timezone: $('s-tz')?.value||state.settings.timezone,
    leaveQuota: parseInt($('s-leave')?.value)||12,
    workingHours: parseInt($('s-hours')?.value)||9,
    allowWeekendLeave: $('s-weekend')?.classList.contains('on')||false,
  };
  await setDocF('settings','main',s);
  state.settings=s;
  await audit('Settings updated');
  toast('Settings saved');
};

// ── AUDIT LOG PAGE ────────────────────────────────────────────────────────────
function auditPage(){
  const filtered=state.auditLogs.filter(a=>!state.search||a.action?.toLowerCase().includes(state.search.toLowerCase())||a.by?.toLowerCase().includes(state.search.toLowerCase()));
  return `
  <div class="fade-up">
    <div class="page-header">
      <div><div class="page-title">Audit Log</div><div class="page-sub">Complete record of all admin actions</div></div>
      <div class="search-bar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input placeholder="Search logs…" value="${state.search}" oninput="setSearch(this.value)"/></div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Action</th><th>Detail</th><th>By</th><th>When</th></tr></thead>
        <tbody>
          ${filtered.length ? filtered.map(a=>`<tr>
            <td><strong>${a.action}</strong></td>
            <td style="color:var(--textMuted);font-size:12px;">${a.detail||'—'}</td>
            <td><span class="chip">${a.by}</span></td>
            <td style="font-family:var(--font-mono);font-size:11px;color:var(--textMuted);">${new Date(a.at).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
          </tr>`).join('') : '<tr><td colspan="4" class="empty">No logs yet</td></tr>'}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function renderModal(){
  const m=state.modal;
  let content='';

  if(m.type==='create-user'||m.type==='edit-user'){
    const isEdit=m.type==='edit-user';
    content=`
      <div class="modal-title">${isEdit?'Edit User':'Add New User'}</div>
      <div class="field"><label>Full Name *</label><input class="inp" id="m-name" value="${m.form.name}" placeholder="Ananya Sharma"/></div>
      <div class="grid-2">
        <div class="field"><label>Work Email *</label><input class="inp" id="m-email" type="email" value="${m.form.email}" placeholder="ananya@profitpenny.in" ${isEdit?'readonly style="opacity:0.5"':''}/></div>
        <div class="field"><label>Phone</label><input class="inp" id="m-phone" value="${m.form.phone}" placeholder="98XXXXXXXX"/></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Role *</label><select class="sel" id="m-role">${ROLES.map(r=>`<option value="${r}" ${m.form.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
        <div class="field"><label>Department</label><select class="sel" id="m-dept"><option value="">None</option>${state.departments.map(d=>`<option value="${d.id}" ${m.form.dept===d.id?'selected':''}>${d.name}</option>`).join('')}</select></div>
      </div>
      ${!isEdit?`<div style="background:var(--blueBg);border:1px solid rgba(96,165,250,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:12px;">📧 A password setup email will be sent to the user automatically.</div>`:''}
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="${isEdit?`saveEditUser('${m.id}')`:'saveCreateUser()'}">${isEdit?'Save Changes':'Create User'}</button>
      </div>`;
  }

  if(m.type==='permissions'){
    content=`
      <div class="modal-title">Permissions — ${m.name}</div>
      <p style="font-size:13px;color:var(--textMuted);margin-bottom:16px;">Toggle individual permissions for this user. Overrides their role defaults.</p>
      <div class="perms-grid">
        ${PERMISSIONS.map(p=>`
          <div class="perm-row">
            <div class="perm-name">${p.label}</div>
            <button class="perm-toggle ${m.perms[p.key]?'on':'off'}" id="perm-${p.key}" onclick="togglePerm('${p.key}')"></button>
          </div>`).join('')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="savePerms('${m.id}')">Save Permissions</button>
      </div>`;
  }

  if(m.type==='role-perms'){
    content=`
      <div class="modal-title">Default Permissions — ${m.role}</div>
      <p style="font-size:13px;color:var(--textMuted);margin-bottom:16px;">These defaults apply to new users with this role.</p>
      <div class="perms-grid">
        ${PERMISSIONS.map(p=>`
          <div class="perm-row">
            <div class="perm-name">${p.label}</div>
            <button class="perm-toggle ${m.perms[p.key]?'on':'off'}" id="rp-${p.key}" onclick="toggleRolePerm('${p.key}')"></button>
          </div>`).join('')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="saveRolePerms('${m.role}')">Save</button>
      </div>`;
  }

  if(m.type==='confirm-delete'){
    content=`
      <div class="modal-title" style="color:var(--red);">Delete User</div>
      <p style="font-size:14px;color:var(--textMuted);margin-bottom:20px;">Are you sure you want to delete <strong style="color:var(--text)">${m.name}</strong>? This cannot be undone.</p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="deleteUser_('${m.id}','${m.name}')">Delete User</button>
      </div>`;
  }

  if(m.type==='confirm-delete-dept'){
    content=`
      <div class="modal-title" style="color:var(--red);">Delete Department</div>
      <p style="font-size:14px;color:var(--textMuted);margin-bottom:20px;">Delete <strong style="color:var(--text)">${m.name}</strong>? Members in this department won't be deleted but will become unassigned.</p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="deleteDept('${m.id}','${m.name}')">Delete Department</button>
      </div>`;
  }

  if(m.type==='create-dept'||m.type==='edit-dept'){
    const isEdit=m.type==='edit-dept';
    content=`
      <div class="modal-title">${isEdit?'Edit Department':'New Department'}</div>
      <div class="field"><label>Department Name *</label><input class="inp" id="d-name" value="${m.form.name}" placeholder="e.g. Motion Design"/></div>
      <div class="grid-2">
        <div class="field"><label>Head of Department</label><select class="sel" id="d-hod"><option value="">None</option>${state.users.map(u=>`<option value="${u.id}" ${m.form.hodId===u.id?'selected':''}>${u.name}</option>`).join('')}</select></div>
        <div class="field"><label>Manager</label><select class="sel" id="d-mgr"><option value="">None</option>${state.users.map(u=>`<option value="${u.id}" ${m.form.managerId===u.id?'selected':''}>${u.name}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Colour</label><input class="inp" id="d-color" type="color" value="${m.form.color||'#B5D334'}" style="height:44px;padding:4px 8px;cursor:pointer;"/></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="${isEdit?`saveEditDept('${m.id}')`:'saveCreateDept()'}">${isEdit?'Save':'Create'}</button>
      </div>`;
  }

  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${content}</div></div>`;
}

window.closeModal = () => { state.modal=null; render(); };
window.togglePerm = key => { state.modal.perms[key]=!state.modal.perms[key]; document.getElementById('perm-'+key)?.classList.toggle('on'); document.getElementById('perm-'+key)?.classList.toggle('off'); };
window.toggleRolePerm = key => { state.modal.perms[key]=!state.modal.perms[key]; document.getElementById('rp-'+key)?.classList.toggle('on'); document.getElementById('rp-'+key)?.classList.toggle('off'); };

window.saveCreateUser = async () => {
  const name=$('m-name').value.trim(), email=$('m-email').value.trim(), phone=$('m-phone').value.trim(), role=$('m-role').value, dept=$('m-dept').value;
  if(!name||!email){toast('Name and email required','error');return;}
  try{
    const tempPass=Math.random().toString(36).slice(-10)+'Pp1!';
    // Use secondary auth instance — this prevents logging out the currently signed-in admin
    await createUserWithEmailAndPassword(auth2,email,tempPass);
    await signOut(auth2); // sign out from secondary app immediately
    await sendPasswordResetEmail(auth,email,{url:window.location.origin});
  }catch(e){ if(!e.code?.includes('already-in-use')){ toast('Could not create login: '+e.message,'error'); return; } }
  const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const perms=DEFAULT_PERMS[role]||DEFAULT_PERMS['default'];
  const id='u'+Date.now();
  const user={id,name,email,phone,role,dept,av:initials,active:true,permissions:perms,leaveTotal:state.settings.leaveQuota||12,leaveTaken:0};
  await setDocF('users',id,user);
  state.users.push(user);
  await audit(`User created: ${name}`,email);
  toast(`${name} created — invite email sent`);
  state.modal=null; render();
};

window.saveEditUser = async id => {
  const name=$('m-name').value.trim(), phone=$('m-phone').value.trim(), role=$('m-role').value, dept=$('m-dept').value;
  if(!name){toast('Name required','error');return;}
  const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  await updateDocF('users',id,{name,phone,role,dept,av:initials});
  state.users=state.users.map(u=>u.id===id?{...u,name,phone,role,dept,av:initials}:u);
  await audit(`User edited: ${name}`,id);
  toast('User updated'); state.modal=null; render();
};

window.savePerms = async id => {
  await updateDocF('users',id,{permissions:state.modal.perms});
  state.users=state.users.map(u=>u.id===id?{...u,permissions:state.modal.perms}:u);
  await audit(`Permissions updated for user`,id);
  toast('Permissions saved'); state.modal=null; render();
};

window.saveRolePerms = async role => {
  DEFAULT_PERMS[role]={...state.modal.perms};
  await setDocF('roleDefaults',role,state.modal.perms);
  await audit(`Role defaults updated: ${role}`);
  toast(`${role} defaults saved`); state.modal=null; render();
};

window.deleteUser_ = async (id,name) => {
  await deleteDocF('users',id);
  state.users=state.users.filter(u=>u.id!==id);
  await audit(`User deleted: ${name}`,id);
  toast(`${name} deleted`,'info'); state.modal=null; render();
};

window.saveCreateDept = async () => {
  const name=$('d-name').value.trim(), color=$('d-color').value, hodId=$('d-hod').value, managerId=$('d-mgr').value;
  if(!name){toast('Name required','error');return;}
  const id='d'+Date.now();
  const dept={id,name,color,hodId,managerId};
  await setDocF('departments',id,dept);
  state.departments.push(dept);
  await audit(`Department created: ${name}`);
  toast(`${name} created`); state.modal=null; render();
};

window.saveEditDept = async id => {
  const name=$('d-name').value.trim(), color=$('d-color').value, hodId=$('d-hod').value, managerId=$('d-mgr').value;
  await updateDocF('departments',id,{name,color,hodId,managerId});
  state.departments=state.departments.map(d=>d.id===id?{...d,name,color,hodId,managerId}:d);
  await audit(`Department updated: ${name}`);
  toast('Department updated'); state.modal=null; render();
};

window.deleteDept = async (id,name) => {
  await deleteDocF('departments',id);
  state.departments=state.departments.filter(d=>d.id!==id);
  await audit(`Department deleted: ${name}`);
  toast(`${name} deleted`,'info'); state.modal=null; render();
};

// ── HELPERS ──────────────────────────────────────────────────────────────────
function avatarColor(av){
  const colors=['#B5D334','#60A5FA','#F87171','#FBB040','#A78BFA','#4ADE80','#F472B6'];
  const i=(av||'A').charCodeAt(0)%colors.length;
  return colors[i];
}
